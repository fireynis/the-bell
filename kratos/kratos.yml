version: v1.3.1

dsn: memory

serve:
  public:
    base_url: https://bell.themacarthurs.ca/.ory
    cors:
      enabled: true
      allowed_origins:
        - https://bell.themacarthurs.ca
        - http://bell.home.arpa
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: https://bell.themacarthurs.ca/
  allowed_return_urls:
    - https://bell.themacarthurs.ca
    - http://bell.home.arpa

  methods:
    password:
      enabled: true
      config:
        min_password_length: 8

  flows:
    registration:
      enabled: true
      ui_url: https://bell.themacarthurs.ca/auth/registration
      after:
        password:
          hooks:
            - hook: session

    login:
      ui_url: https://bell.themacarthurs.ca/auth/login

    logout:
      after:
        default_browser_return_url: https://bell.themacarthurs.ca/

    settings:
      ui_url: https://bell.themacarthurs.ca/auth/settings

    recovery:
      enabled: true
      ui_url: https://bell.themacarthurs.ca/auth/recovery

    verification:
      enabled: true
      ui_url: https://bell.themacarthurs.ca/auth/verification

session:
  cookie:
    name: bell_session
    domain: bell.themacarthurs.ca
    same_site: Lax
  lifespan: 720h

cookies:
  domain: bell.themacarthurs.ca
  same_site: Lax

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/kratos/identity.schema.json

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

log:
  level: info
  format: json
