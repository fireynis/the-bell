services:
  postgres:
    image: apache/age:latest
    container_name: bell-postgres
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belluser -d bell"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_USER: belluser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: bell
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - bell

  kratos-migrate:
    image: oryd/kratos:v1.3.1
    container_name: bell-kratos-migrate
    restart: "no"
    command: migrate sql -e --yes
    environment:
      DSN: postgres://belluser:${POSTGRES_PASSWORD}@postgres:5432/bell_kratos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bell

  kratos:
    image: oryd/kratos:v1.3.1
    container_name: bell-kratos
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4433/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    command: serve --config /etc/kratos/kratos.yml --dev
    environment:
      DSN: postgres://belluser:${POSTGRES_PASSWORD}@postgres:5432/bell_kratos?sslmode=disable
    volumes:
      - ./kratos/kratos.yml:/etc/kratos/kratos.yml:ro
      - ./kratos/identity.schema.json:/etc/kratos/identity.schema.json:ro
    networks:
      - bell

  redis:
    image: redis:7-alpine
    container_name: bell-redis
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - bell

  bell:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bell
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      kratos:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BELL_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://belluser:${POSTGRES_PASSWORD}@postgres:5432/bell?sslmode=disable
      REDIS_URL: redis://redis:6379
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      PORT: "8080"
      TOWN_NAME: "${TOWN_NAME:-My Town}"
      IMAGE_STORAGE_PATH: /data/images
    volumes:
      - bell_images:/data/images
    networks:
      - bell

volumes:
  postgres_data:
  bell_images:

networks:
  bell:
